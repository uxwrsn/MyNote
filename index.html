<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 노트 (MyNote)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>MyNote</h1>
            <div class="header-actions">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 노트 검색...">
                <button id="themeToggleBtn" class="btn">🌙</button>
                <button id="settingsBtn" class="btn" title="AI 설정">⚙️</button>
                <button id="addNoteBtn" class="btn primary">새 노트 작성</button>
            </div>
        </header>
        <main>
            <div id="noteEditor" class="hidden">
                <input type="text" id="noteTitle" placeholder="노트 제목">
                <textarea id="noteContent" placeholder="내용을 입력하세요..."></textarea>
                <div class="editor-actions">
                    <button id="saveNoteBtn" class="btn success">저장</button>
                    <button id="cancelNoteBtn" class="btn">취소</button>
                </div>
            </div>
            <div id="notesContainer" class="notes-grid">
                <!-- 노트 목록이 여기에 렌더링됩니다 -->
            </div>
            <div id="emptyState" class="hidden empty-state">
                검색 결과가 없습니다.
            </div>
        </main>
    </div>

    <!-- 긴 노트 보기를 위한 모달 -->
    <div id="viewModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="closeModalBtn">&times;</span>
            <h2 id="modalTitle"></h2>
            <div id="modalContent" class="modal-body"></div>
            
            <!-- AI 응답 영역 -->
            <div id="aiResponseArea" class="ai-response-area hidden">
                <div class="ai-header">
                    <h4>🤖 AI 어시스턴트</h4>
                    <button id="closeAiBtn" class="btn-text">닫기</button>
                </div>
                <div id="aiResponseContent" class="ai-content">응답을 기다리는 중...</div>
            </div>

            <div class="modal-footer">
                <span id="modalDate"></span>
                <div class="modal-buttons">
                    <button id="aiSummarizeBtn" class="btn ai-btn">✨ 요약</button>
                    <button id="aiOpinionBtn" class="btn ai-btn">✨ 의견</button>
                    <button id="editFromModalBtn" class="btn primary">수정</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 설정 모달 (API 키 입력) -->
    <div id="settingsModal" class="modal hidden">
        <div class="modal-content modal-small">
            <span class="close-btn" id="closeSettingsBtn">&times;</span>
            <h2>⚙️ 환경 설정</h2>
            <div class="form-group">
                <label for="apiKeyInput">Google Gemini API 키 (AI 기능용)</label>
                <input type="password" id="apiKeyInput" placeholder="AI 키를 입력하세요">
                <small class="help-text">발급: <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a> (무료)</small>
            </div>
            <button id="saveSettingsBtn" class="btn success w-100">저장</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
